# Optional Sakura Frp client for the NUC.
# Start it with:
#   docker compose -f compose.yaml -f compose.frp.yml up -d sakura-frpc

services:
  sakura-frpc:
    image: ${SAKURA_FRP_IMAGE:-natfrp.com/frpc}
    container_name: ${COMPOSE_PROJECT_NAME:-game-panel}-sakura-frpc
    restart: unless-stopped
    network_mode: host
    command:
      - --disable_log_color
      - -f
      - ${SAKURA_FRP_TOKEN:?Set SAKURA_FRP_TOKEN in .env}:${SAKURA_FRP_TUNNEL_IDS:?Set SAKURA_FRP_TUNNEL_IDS in .env}
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: "${LOG_MAX_FILE:-3}"

